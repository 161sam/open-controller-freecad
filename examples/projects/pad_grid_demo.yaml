project:
  id: "pad_grid_demo"
  name: "Pad Grid Demo"
  source:
    kind: "variant"
    id: "pad_grid_4x4_oled"
  output_prefix: "pad_grid_demo"

firmware:
  controller_mcu:
    id: "rp2040"
    family: "RP2040"
  io_strategy:
    default: "direct_gpio"
    pad: "matrix"
    display: "i2c"
  buses:
    i2c0:
      type: "i2c"
      pins:
        sda: "GPIO0"
        scl: "GPIO1"

overrides:
  controller:
    surface:
      width: 270
      height: 220
  zones:
    - id: "pad_matrix"
      type: "grid"
      x: 20
      y: 20
      width: 180
      height: 180
      strategy: "grid"
    - id: "display_zone"
      type: "grid"
      x: 220
      y: 24
      width: 34
      height: 26
      strategy: "grid"
  components:
    update:
      pad1:
        row: 0
        col: 0
        io_strategy: "matrix"
      pad2:
        row: 0
        col: 1
        io_strategy: "matrix"
      pad3:
        row: 0
        col: 2
        io_strategy: "matrix"
      pad4:
        row: 0
        col: 3
        io_strategy: "matrix"
      pad5:
        row: 1
        col: 0
        io_strategy: "matrix"
      pad6:
        row: 1
        col: 1
        io_strategy: "matrix"
      pad7:
        row: 1
        col: 2
        io_strategy: "matrix"
      pad8:
        row: 1
        col: 3
        io_strategy: "matrix"
      pad9:
        row: 2
        col: 0
        io_strategy: "matrix"
      pad10:
        row: 2
        col: 1
        io_strategy: "matrix"
      pad11:
        row: 2
        col: 2
        io_strategy: "matrix"
      pad12:
        row: 2
        col: 3
        io_strategy: "matrix"
      pad13:
        row: 3
        col: 0
        io_strategy: "matrix"
      pad14:
        row: 3
        col: 1
        io_strategy: "matrix"
      pad15:
        row: 3
        col: 2
        io_strategy: "matrix"
      pad16:
        row: 3
        col: 3
        io_strategy: "matrix"
      oled_status:
        io_strategy: "i2c"
        bus: "i2c0"
        address: "0x3C"

pipeline:
  layout:
    strategy: "zone"
    config:
      grid_mm: 1.0
      spacing_x_mm: 44
      spacing_y_mm: 44
      padding_mm: 6
  constraints:
    config: {}
